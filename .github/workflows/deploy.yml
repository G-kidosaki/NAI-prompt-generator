name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 同時に複数のデプロイが走らないようにする（後発が前のを上書き）
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write  # gh-pages ブランチへ push するために必要

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build PWA
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          # main 以外からの誤発火を防ぐ
          keep_files: false
          commit_message: "deploy: ${{ github.sha }}"
